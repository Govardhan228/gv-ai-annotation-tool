name: Temporary ngrok share (manual)

on:
  workflow_dispatch:

jobs:
  ngrok-share:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Start dev server
        run: >-
          nohup npm run dev --silent &
          echo $! > server.pid
          sleep 6

      - id: ngrok
        name: Start ngrok tunnel
        uses: wernight/ngrok-action@v5
        with:
          authtoken: ${{ secrets.NGROK_AUTHTOKEN }}
          port: 5173

      - name: Print public URLs
        run: |
          echo "Frontend public: ${{ steps.ngrok.outputs.url }}"
          echo "You can use the URL above for approx. the duration of this job (timeout: 60min)."

      - name: Keep tunnel open for demo (sleep)
        run: |
          echo "Keeping job active; press Ctrl-C to cancel in runner if needed.";
          # Print the URL periodically so it's visible in logs for the demo
          for i in {1..30}; do echo "(keepalive) $i - ${{ steps.ngrok.outputs.url }}"; sleep 60; done
